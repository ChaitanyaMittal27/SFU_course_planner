# Server Port (Elastic Beanstalk uses 5000) [default 8080]
server.port=${SERVER_PORT:5000}

# Supabase PostgreSQL Connection (Session Pooler for IPv4)
spring.datasource.url=${DB_URL_NEW}
spring.datasource.username=${DB_USER_NEW}
spring.datasource.password=${DB_PASS_NEW}
spring.datasource.driver-class-name=org.postgresql.Driver
supabase.project.url=${SUPABASE_URL_NEW}
supabase.anon.key=${SUPABASE_KEY_NEW}

# JPA settings
spring.jpa.hibernate.ddl-auto=validate
# Production: SQL logging disabled (set to true for local debugging)
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.open-in-view=false

# Logging — production-safe levels (debug settings removed)
logging.level.root=INFO
logging.level.com.example.courseplanner=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN

# Server Settings
server.error.include-message=always
server.error.include-stacktrace=never
